---
services:
  mailpit:
    image: axllent/mailpit:v1.27@sha256:986b14ff7b253e62883ea19fd3112806f116e5e2f221e03f12fb81c7312ff532

  fetchmail:
    links:
      - mda:mda.local

  test:
    build: ./test
    volumes:
      - data-mail:/var/vmail:ro
      - data-tls:/media/tls:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # For development
      - ./test/rootfs/usr/share/tests:/usr/share/tests:ro
    env_file: .env
    depends_on:
      - mailpit
      - fetchmail

  # For development
  # web:
  #   volumes:
  #     - ./web/rootfs/etc/nginx/nginx.conf.templ:/etc/nginx/nginx.conf.templ:ro
  #   ports:
  #     - "0.0.0.0:81:80"
